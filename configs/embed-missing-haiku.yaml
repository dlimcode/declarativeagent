# Fill missing embedding cells on Claude-Haiku-4.5. Prompt caching active in
# cached_generate (cache_control on system message — Anthropic native).

domain: banking_knowledge
user_llm: anthropic/claude-haiku-4-5-20251001
agent_llm: anthropic/claude-haiku-4-5-20251001
agent_llm_args:
  max_tokens: 4096
num_trials: 1
