# Pilot v2: 5 tasks x 4 conditions x 1 trial = 20 simulations
# Validates all v2 conditions before full run

domain: banking_knowledge
user_llm: deepseek/deepseek-v4-pro
agent_llm: deepseek/deepseek-v4-pro
agent_llm_args:
  max_tokens: 4096
num_trials: 1
max_concurrency: 4
seed: 300

task_ids:
  - task_001
  - task_002
  - task_003
  - task_050
  - task_070

conditions:
  declarative_v2_golden:
    agent: declarative_agent_v2
    retrieval_config: golden_retrieval
  declarative_v2_bm25:
    agent: declarative_agent_v2
    retrieval_config: bm25
  imperative_v2_golden:
    agent: imperative_agent_v2
    retrieval_config: golden_retrieval
  imperative_v2_bm25:
    agent: imperative_agent_v2
    retrieval_config: bm25
